<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#2563eb">
    <title>動画圧縮 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; overscroll-behavior: none; }
        .log-area { font-family: monospace; font-size: 11px; }
        .compressing-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* スライダー */
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            height: 10px; border-radius: 5px; background: #e2e8f0; outline: none;
            width: 100%;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 28px; height: 28px; border-radius: 50%;
            background: #2563eb; cursor: pointer; border: 3px solid white;
            box-shadow: 0 2px 8px rgba(37,99,235,0.4);
        }
        input[type="range"]::-moz-range-thumb {
            width: 28px; height: 28px; border-radius: 50%;
            background: #2563eb; cursor: pointer; border: 3px solid white;
            box-shadow: 0 2px 8px rgba(37,99,235,0.4);
        }

        /* タッチターゲット最小サイズ保証 */
        button { min-height: 44px; }

        /* ドロップゾーン */
        .drop-zone-active {
            background-color: rgba(37, 99, 235, 0.08) !important;
            border-color: #2563eb !important;
        }

        /* ファイル名の省略 */
        .filename-truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 0;
            min-width: 0;
        }

        /* セーフエリア対応 */
        .safe-area-padding {
            padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // --- アイコンコンポーネント ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const FileVideo = (props) => <IconWrapper {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13 5 3-5 3v-6Z"/></IconWrapper>;
        const Download = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconWrapper>;
        const Shrink = (props) => <IconWrapper {...props}><path d="m15 15 6 6m-6-6v4.8m0-4.8h4.8M9 9 3 3m6 6V4.2M9 9H4.2M15 9l6-6m-6 6V4.2m0 4.8h4.8M9 15l-6 6m6-6v4.8m0-4.8H4.2"/></IconWrapper>;
        const Trash2 = (props) => <IconWrapper {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></IconWrapper>;
        const Target = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconWrapper>;
        const Upload = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></IconWrapper>;
        const RefreshCw = (props) => <IconWrapper {...props}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
        const AlertTriangle = (props) => <IconWrapper {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></IconWrapper>;
        const ChevronDown = (props) => <IconWrapper {...props}><polyline points="6 9 12 15 18 9"/></IconWrapper>;

        // --- 圧縮パラメータ自動計算 ---
        function calcCompressionParams(fileSizeMB, durationSec, targetMB) {
            const targetBits = targetMB * 1024 * 1024 * 8;
            const audioBits = 128000;
            const videoBitsPerSec = Math.max(100000, (targetBits / durationSec) - audioBits);
            const ratio = targetMB / fileSizeMB;
            let scale;
            if (ratio >= 0.7) scale = 1.0;
            else if (ratio >= 0.4) scale = 0.7;
            else if (ratio >= 0.2) scale = 0.5;
            else scale = 0.35;
            return { videoBitsPerSec: Math.round(videoBitsPerSec), scale };
        }

        function App() {
            const [file, setFile] = useState(null);
            const [fileMeta, setFileMeta] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [compressedFile, setCompressedFile] = useState(null);
            const [progress, setProgress] = useState(0);
            const [logs, setLogs] = useState([]);
            const [attempt, setAttempt] = useState(0);
            const [mode, setMode] = useState('target');
            const [targetSizeMB, setTargetSizeMB] = useState(30);
            const [scale, setScale] = useState(0.7);
            const [quality, setQuality] = useState(2500000);
            const [retryParams, setRetryParams] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [showLog, setShowLog] = useState(false);

            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const recorderRef = useRef(null);
            const chunksRef = useRef([]);
            const progressTimerRef = useRef(null);
            const dropZoneRef = useRef(null);

            const addLog = (msg) => {
                setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev].slice(0, 20));
            };

            const resetAll = () => {
                setFile(null);
                setFileMeta(null);
                setCompressedFile(null);
                setProgress(0);
                setIsProcessing(false);
                setAttempt(0);
                setRetryParams(null);
                setLogs(["リセットしました"]);
                if (videoRef.current) videoRef.current.src = "";
                if (progressTimerRef.current) clearInterval(progressTimerRef.current);
            };

            const processFile = (f) => {
                if (!f) return;
                setFile(f);
                setCompressedFile(null);
                setProgress(0);
                setAttempt(0);
                setRetryParams(null);
                addLog(`読み込み完了: ${f.name} (${(f.size / 1024 / 1024).toFixed(1)} MB)`);
                const tempVideo = document.createElement('video');
                tempVideo.preload = 'metadata';
                tempVideo.onloadedmetadata = () => {
                    setFileMeta({
                        duration: tempVideo.duration,
                        width: tempVideo.videoWidth,
                        height: tempVideo.videoHeight
                    });
                    addLog(`動画情報: ${tempVideo.videoWidth}x${tempVideo.videoHeight}, ${tempVideo.duration.toFixed(1)}秒`);
                    URL.revokeObjectURL(tempVideo.src);
                };
                tempVideo.src = URL.createObjectURL(f);
                if (f.size <= 30 * 1024 * 1024) {
                    addLog("✅ このファイルは既に30MB以下です");
                }
            };

            const handleFileChange = (e) => processFile(e.target.files[0]);

            // ドラッグ&ドロップ（PC用）
            const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const handleDragLeave = () => setIsDragging(false);
            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const f = e.dataTransfer.files[0];
                if (f && f.type.startsWith('video/')) processFile(f);
            };

            const startCompression = useCallback((overrideScale, overrideBitrate, attemptNum) => {
                if (!file) return;
                setIsProcessing(true);
                setCompressedFile(null);
                chunksRef.current = [];

                const currentAttempt = attemptNum || attempt + 1;
                setAttempt(currentAttempt);

                let useScale, useBitrate;

                if (mode === 'target' && fileMeta) {
                    const fileSizeMB = file.size / 1024 / 1024;
                    if (overrideScale !== undefined && overrideBitrate !== undefined) {
                        useScale = overrideScale;
                        useBitrate = overrideBitrate;
                    } else {
                        const params = calcCompressionParams(fileSizeMB, fileMeta.duration, targetSizeMB);
                        useScale = params.scale;
                        useBitrate = params.videoBitsPerSec;
                    }
                    addLog(`[試行${currentAttempt}] 目標: ${targetSizeMB}MB → ビットレート: ${(useBitrate/1000).toFixed(0)}kbps, 解像度: ${Math.round(useScale*100)}%`);
                } else {
                    useScale = scale;
                    useBitrate = quality;
                    addLog(`手動設定 → ビットレート: ${(useBitrate/1000).toFixed(0)}kbps, 解像度: ${Math.round(useScale*100)}%`);
                }

                const video = videoRef.current;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const objectUrl = URL.createObjectURL(file);

                video.src = objectUrl;
                video.playbackRate = 2.0;
                video.muted = true;

                video.onloadedmetadata = () => {
                    canvas.width = Math.round(video.videoWidth * useScale);
                    canvas.height = Math.round(video.videoHeight * useScale);
                    addLog(`出力解像度: ${canvas.width}x${canvas.height}`);

                    const stream = canvas.captureStream(30);
                    try {
                        const srcStream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
                        const audioTracks = srcStream.getAudioTracks();
                        audioTracks.forEach(track => stream.addTrack(track));
                    } catch(e) {
                        addLog("⚠ 音声トラックの取得に失敗（音声なし出力）");
                    }

                    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
                        ? 'video/webm;codecs=vp9'
                        : 'video/webm';

                    const recorder = new MediaRecorder(stream, {
                        mimeType,
                        videoBitsPerSecond: useBitrate
                    });

                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunksRef.current.push(e.data);
                    };

                    recorder.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'video/webm' });
                        const resultSizeMB = blob.size / 1024 / 1024;
                        const compressionPct = Math.round((blob.size / file.size) * 100);
                        addLog(`圧縮結果: ${resultSizeMB.toFixed(1)} MB (元の${compressionPct}%)`);

                        if (mode === 'target' && resultSizeMB > targetSizeMB && currentAttempt < 3) {
                            addLog(`⚠ 目標 ${targetSizeMB}MB を超過 → パラメータ調整して再試行...`);
                            URL.revokeObjectURL(objectUrl);
                            const newBitrate = Math.max(100000, Math.round(useBitrate * 0.65));
                            const newScale = Math.max(0.25, useScale * 0.8);
                            setRetryParams({ scale: newScale, bitrate: newBitrate });
                            setTimeout(() => {
                                startCompression(newScale, newBitrate, currentAttempt + 1);
                            }, 500);
                            return;
                        }

                        const url = URL.createObjectURL(blob);
                        setCompressedFile({
                            url,
                            name: `compressed_${file.name.split('.')[0]}.webm`,
                            size: blob.size
                        });

                        if (mode === 'target' && resultSizeMB > targetSizeMB) {
                            addLog(`⚠ ${currentAttempt}回の試行後も目標未達（${resultSizeMB.toFixed(1)}MB）。手動で画質を下げてお試しください。`);
                        } else if (mode === 'target') {
                            addLog(`✅ 目標 ${targetSizeMB}MB 以内に圧縮成功！`);
                        }

                        setIsProcessing(false);
                        URL.revokeObjectURL(objectUrl);
                    };

                    recorderRef.current = recorder;

                    const drawFrame = () => {
                        if (video.paused || video.ended) return;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        requestAnimationFrame(drawFrame);
                    };

                    addLog("圧縮処理を開始します...");
                    recorder.start();
                    video.play();
                    drawFrame();
                };

                if (progressTimerRef.current) clearInterval(progressTimerRef.current);
                progressTimerRef.current = setInterval(() => {
                    const video = videoRef.current;
                    if (!video) return;
                    if (video.ended) {
                        clearInterval(progressTimerRef.current);
                        if (recorderRef.current && recorderRef.current.state !== 'inactive') {
                            recorderRef.current.stop();
                        }
                    }
                    if (video.duration) {
                        setProgress(Math.round((video.currentTime / video.duration) * 100));
                    }
                }, 500);
            }, [file, fileMeta, mode, targetSizeMB, scale, quality, attempt]);

            const fileSizeMB = file ? (file.size / 1024 / 1024) : 0;
            const isAlreadyUnderTarget = file && fileSizeMB <= targetSizeMB;
            const estimatedParams = (mode === 'target' && fileMeta && file)
                ? calcCompressionParams(fileSizeMB, fileMeta.duration, targetSizeMB)
                : null;

            return (
                <div className="min-h-screen bg-slate-50">
                    {/* ヘッダー */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
                        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl text-white shadow-sm shadow-blue-200 flex-shrink-0">
                                <Shrink size={20} />
                            </div>
                            <div className="flex-1 min-w-0">
                                <h1 className="text-lg font-bold tracking-tight text-slate-800 leading-tight">動画圧縮 Pro</h1>
                                <p className="text-slate-400 text-xs hidden sm:block">Premium Video Compressor</p>
                            </div>
                            {file && !isProcessing && (
                                <button
                                    onClick={resetAll}
                                    className="flex items-center gap-1 px-3 py-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors text-sm font-medium"
                                >
                                    <Trash2 size={16} />
                                    <span className="hidden sm:inline">リセット</span>
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-5 space-y-4 safe-area-padding">

                        {/* ファイル未選択：ドロップゾーン */}
                        {!file && (
                            <div
                                ref={dropZoneRef}
                                onDragOver={handleDragOver}
                                onDragLeave={handleDragLeave}
                                onDrop={handleDrop}
                                className={`bg-white rounded-3xl shadow-sm border-2 border-dashed transition-all overflow-hidden ${isDragging ? 'drop-zone-active border-blue-400' : 'border-slate-200'}`}
                            >
                                <div className="flex flex-col items-center py-10 px-6">
                                    <div className={`p-6 rounded-full mb-5 transition-all ${isDragging ? 'bg-blue-100 scale-110' : 'bg-blue-50'}`}>
                                        <FileVideo size={48} className="text-blue-400" />
                                    </div>
                                    <p className="font-bold text-lg text-slate-700 text-center mb-1">動画を選択してください</p>
                                    <p className="text-slate-300 text-xs mb-6">MP4, MOV, AVI, WebM など</p>

                                    <div className="flex flex-col gap-3 w-full max-w-xs">
                                        {/* フォトライブラリ／ギャラリーから */}
                                        <label className="flex items-center justify-center gap-3 w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-md shadow-blue-200 cursor-pointer active:scale-95 transition-all hover:bg-blue-700">
                                            <input type="file" className="hidden" onChange={handleFileChange} accept="video/*" />
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                            フォトライブラリ／ギャラリー
                                        </label>

                                        {/* ファイルアプリから */}
                                        <label className="flex items-center justify-center gap-3 w-full py-4 bg-white border-2 border-slate-200 text-slate-600 font-bold rounded-2xl cursor-pointer active:scale-95 transition-all hover:border-blue-300">
                                            <input type="file" className="hidden" onChange={handleFileChange} accept="video/*,video/mp4,video/x-m4v,video/quicktime,video/webm,video/x-matroska,*/*" />
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                                            ファイルアプリから選ぶ
                                        </label>

                                        <p className="hidden sm:block text-center text-xs text-slate-300 mt-1">またはここにドラッグ＆ドロップ</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ファイル選択済み */}
                        {file && (
                            <>
                                {/* ファイル情報カード */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-sm flex-shrink-0">
                                            <FileVideo size={20} />
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold text-slate-800 text-sm truncate">{file.name}</p>
                                            <div className="flex flex-wrap gap-x-3 gap-y-0.5 text-xs font-medium text-slate-400 mt-0.5">
                                                <span>{fileSizeMB.toFixed(1)} MB</span>
                                                {fileMeta && <span>{fileMeta.duration.toFixed(1)}秒</span>}
                                                {fileMeta && <span>{fileMeta.width}×{fileMeta.height}</span>}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 設定パネル（処理中は非表示） */}
                                {!isProcessing && !compressedFile && (
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-5 space-y-5">
                                        {/* モード切替 */}
                                        <div className="flex gap-2 bg-slate-100 p-1.5 rounded-2xl">
                                            <button
                                                onClick={() => setMode('target')}
                                                className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 ${mode === 'target' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-white'}`}
                                            >
                                                <Target size={15} />
                                                目標サイズ
                                            </button>
                                            <button
                                                onClick={() => setMode('manual')}
                                                className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 ${mode === 'manual' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-white'}`}
                                            >
                                                <Shrink size={15} />
                                                手動設定
                                            </button>
                                        </div>

                                        {mode === 'target' ? (
                                            <div className="space-y-4">
                                                {/* サイズスライダー */}
                                                <div className="bg-slate-50 p-4 rounded-2xl border space-y-4">
                                                    <div>
                                                        <div className="flex justify-between items-end mb-3">
                                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">目標ファイルサイズ</label>
                                                            <span className="text-2xl font-bold text-blue-600">{targetSizeMB} <span className="text-sm font-bold">MB</span></span>
                                                        </div>
                                                        <input
                                                            type="range" min="5" max="100" step="1"
                                                            value={targetSizeMB}
                                                            onChange={e => setTargetSizeMB(Number(e.target.value))}
                                                        />
                                                        <div className="flex justify-between text-xs font-bold text-slate-300 mt-1">
                                                            <span>5 MB</span><span>100 MB</span>
                                                        </div>
                                                    </div>

                                                    {/* プリセットボタン */}
                                                    <div className="grid grid-cols-4 gap-2">
                                                        {[
                                                            { mb: 10, label: '10MB', desc: 'メール' },
                                                            { mb: 25, label: '25MB', desc: 'チャット' },
                                                            { mb: 30, label: '30MB', desc: 'Claude' },
                                                            { mb: 50, label: '50MB', desc: 'SNS' },
                                                        ].map(p => (
                                                            <button
                                                                key={p.mb}
                                                                onClick={() => setTargetSizeMB(p.mb)}
                                                                className={`py-2.5 rounded-xl text-center transition-all border ${targetSizeMB === p.mb ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-500 hover:border-blue-300 active:bg-blue-50'}`}
                                                            >
                                                                <div className="text-xs font-bold">{p.label}</div>
                                                                <div className="text-[9px] opacity-70">{p.desc}</div>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                {/* 予測情報 */}
                                                {estimatedParams && (
                                                    <div className={`p-4 rounded-2xl border text-sm ${isAlreadyUnderTarget ? 'bg-emerald-50 border-emerald-100' : 'bg-blue-50 border-blue-100'}`}>
                                                        {isAlreadyUnderTarget ? (
                                                            <p className="text-emerald-700 font-medium flex items-center gap-2">
                                                                ✅ このファイルは既に {targetSizeMB}MB 以下です（{fileSizeMB.toFixed(1)}MB）。圧縮不要です。
                                                            </p>
                                                        ) : (
                                                            <div className="space-y-1">
                                                                <p className="text-xs text-blue-700 font-bold">自動計算された圧縮設定:</p>
                                                                <p className="text-xs text-blue-600">
                                                                    映像ビットレート: {(estimatedParams.videoBitsPerSec / 1000).toFixed(0)} kbps ／
                                                                    解像度: {Math.round(estimatedParams.scale * 100)}%
                                                                    {fileMeta && ` (${Math.round(fileMeta.width * estimatedParams.scale)}×${Math.round(fileMeta.height * estimatedParams.scale)})`}
                                                                </p>
                                                                <p className="text-xs text-blue-400 mt-1">
                                                                    ※ 超過した場合は自動再試行（最大3回）
                                                                </p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            /* 手動設定モード */
                                            <div className="space-y-4">
                                                <div className="bg-slate-50 p-4 rounded-2xl border space-y-4">
                                                    <div>
                                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">解像度</label>
                                                        <div className="flex gap-2">
                                                            {[[1.0, "100%（元画質）"], [0.7, "70%（推奨）"], [0.5, "50%（軽量）"]].map(([v, l]) => (
                                                                <button
                                                                    key={v}
                                                                    onClick={() => setScale(v)}
                                                                    className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all ${scale === v ? 'bg-blue-600 text-white' : 'bg-white border text-slate-500 active:bg-blue-50'}`}
                                                                >
                                                                    {l}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">画質</label>
                                                        <div className="flex gap-2">
                                                            {[[1000000, "低画質"], [2500000, "標準（推奨）"], [5000000, "高画質"]].map(([v, l]) => (
                                                                <button
                                                                    key={v}
                                                                    onClick={() => setQuality(v)}
                                                                    className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all ${quality === v ? 'bg-blue-600 text-white' : 'bg-white border text-slate-500 active:bg-blue-50'}`}
                                                                >
                                                                    {l}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                                    <p className="text-xs text-blue-700 leading-relaxed font-medium">
                                                        目安: 解像度 70% × 標準 設定で、容量を約 <span className="text-base font-bold">40〜60%</span> 削減できます。
                                                    </p>
                                                </div>
                                            </div>
                                        )}

                                        {/* 圧縮ボタン */}
                                        <button
                                            onClick={() => startCompression()}
                                            disabled={isAlreadyUnderTarget && mode === 'target'}
                                            className={`w-full py-5 font-bold rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3 text-lg active:scale-95 ${
                                                isAlreadyUnderTarget && mode === 'target'
                                                    ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'
                                                    : 'bg-blue-600 text-white shadow-blue-200 hover:bg-blue-700'
                                            }`}
                                        >
                                            <Shrink size={22} />
                                            {mode === 'target' ? `${targetSizeMB}MB 以下に圧縮` : '圧縮を開始する'}
                                        </button>
                                    </div>
                                )}

                                {/* 処理中 */}
                                {isProcessing && (
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-5 space-y-5">
                                        <div className="relative aspect-video bg-black rounded-2xl overflow-hidden">
                                            <video ref={videoRef} className="hidden" crossOrigin="anonymous" />
                                            <canvas ref={canvasRef} className="w-full h-full object-contain" />
                                            <div className="absolute top-4 left-4 flex items-center gap-2 bg-blue-600 text-white px-3 py-1.5 rounded-full text-xs font-bold tracking-wider compressing-pulse shadow">
                                                <div className="w-2 h-2 bg-white rounded-full"></div>
                                                {attempt > 1 ? `RETRY ${attempt}/3...` : 'COMPRESSING...'}
                                            </div>
                                            {mode === 'target' && (
                                                <div className="absolute top-4 right-4 bg-black/60 text-white px-3 py-1.5 rounded-full text-xs font-bold">
                                                    🎯 目標: {targetSizeMB}MB
                                                </div>
                                            )}
                                        </div>

                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm font-bold text-blue-600">
                                                    処理中{attempt > 1 ? ` （試行 ${attempt}/3）` : ''}
                                                </span>
                                                <span className="text-2xl font-bold text-slate-800">{progress}%</span>
                                            </div>
                                            <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                                                <div className="bg-blue-600 h-full transition-all duration-300 rounded-full" style={{width:`${progress}%`}} />
                                            </div>
                                            <p className="text-center text-xs font-bold text-slate-400 uppercase tracking-widest">
                                                タブを閉じずにお待ちください
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {/* 完了表示 */}
                                {compressedFile && !isProcessing && (() => {
                                    const resultMB = compressedFile.size / 1024 / 1024;
                                    const isOverTarget = mode === 'target' && resultMB > targetSizeMB;
                                    return (
                                        <div className={`${isOverTarget ? 'bg-amber-50 border-amber-100' : 'bg-emerald-50 border-emerald-100'} border rounded-3xl p-6 text-center space-y-5`}>
                                            <div className={`${isOverTarget ? 'bg-amber-500 shadow-amber-200' : 'bg-emerald-500 shadow-emerald-200'} w-16 h-16 rounded-full flex items-center justify-center mx-auto text-white shadow-lg`}>
                                                {isOverTarget ? <AlertTriangle size={32} /> : <Download size={32} />}
                                            </div>
                                            <div>
                                                <h3 className={`text-xl font-bold mb-1 ${isOverTarget ? 'text-amber-800' : 'text-emerald-800'}`}>
                                                    {isOverTarget ? '目標サイズに収まりませんでした' : '圧縮が完了しました！'}
                                                </h3>
                                                {isOverTarget && (
                                                    <p className="text-sm text-amber-700">手動設定モードで画質を下げてお試しください</p>
                                                )}
                                            </div>

                                            <div className={`flex justify-center gap-4 text-sm font-bold p-4 rounded-2xl ${isOverTarget ? 'bg-amber-100' : 'bg-emerald-100'}`}>
                                                <div className="text-center">
                                                    <p className="text-xs text-slate-500 mb-1">元のサイズ</p>
                                                    <p className="text-slate-700">{fileSizeMB.toFixed(1)} MB</p>
                                                </div>
                                                <div className="flex items-center text-slate-400">→</div>
                                                <div className="text-center">
                                                    <p className="text-xs text-slate-500 mb-1">圧縮後</p>
                                                    <p className={isOverTarget ? 'text-amber-700' : 'text-emerald-700'}>
                                                        {resultMB.toFixed(1)} MB
                                                        <span className="text-xs block opacity-70">元の{Math.round((compressedFile.size / file.size) * 100)}%</span>
                                                    </p>
                                                </div>
                                                {mode === 'target' && !isOverTarget && (
                                                    <div className="text-center">
                                                        <p className="text-xs text-slate-500 mb-1">目標</p>
                                                        <p className="text-emerald-600">{targetSizeMB}MB ✓</p>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="flex flex-col gap-3">
                                                <button
                                                    onClick={() => {
                                                        const a = document.createElement('a');
                                                        a.href = compressedFile.url;
                                                        a.download = compressedFile.name;
                                                        a.click();
                                                    }}
                                                    className={`w-full py-4 text-white font-bold rounded-2xl shadow-lg transition-all flex items-center justify-center gap-3 text-base active:scale-95 ${isOverTarget ? 'bg-amber-600 hover:bg-amber-700 shadow-amber-200' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-200'}`}
                                                >
                                                    <Download size={20} />
                                                    圧縮した動画を保存
                                                </button>
                                                <button
                                                    onClick={() => { setCompressedFile(null); setProgress(0); setAttempt(0); }}
                                                    className="w-full py-4 bg-white border-2 border-slate-200 text-slate-600 font-bold rounded-2xl hover:border-blue-300 transition-all flex items-center justify-center gap-2 active:scale-95"
                                                >
                                                    <RefreshCw size={18} />
                                                    設定を変えて再圧縮
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </>
                        )}

                        {/* ログエリア（折りたたみ式） */}
                        <div className="bg-slate-900 text-slate-400 rounded-2xl overflow-hidden border border-slate-800">
                            <button
                                onClick={() => setShowLog(!showLog)}
                                className="w-full px-4 py-3 flex items-center gap-2 text-left"
                            >
                                <span className="w-2 h-2 rounded-full bg-blue-500 flex-shrink-0"></span>
                                <span className="text-blue-400 font-bold text-sm flex-1 log-area">System Activity Log</span>
                                <ChevronDown
                                    size={16}
                                    className={`text-slate-500 transition-transform ${showLog ? 'rotate-180' : ''}`}
                                />
                            </button>
                            {showLog && (
                                <div className="px-4 pb-4 space-y-1 max-h-40 overflow-y-auto log-area text-xs">
                                    {logs.map((log, i) => <p key={i} className="opacity-80 leading-relaxed">{log}</p>)}
                                    {logs.length === 0 && <p className="italic opacity-30">待機中...</p>}
                                </div>
                            )}
                        </div>

                        {/* フッター注釈 */}
                        <p className="text-center text-xs text-slate-300 pb-4">
                            動画の処理はすべてブラウザ内で完結します。サーバーへのアップロードはありません。
                        </p>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
